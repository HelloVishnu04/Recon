name: Recon CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8 (Optional)
      run: |
        # install flake8 for basic python validation
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Start FastAPI Backend in background
      env:
        MODELS_DIR: models
      run: |
        # Run FastAPI using python uvicorn
        python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &

    - name: Wait for FastAPI backend
      run: |
        python -c "
        import time, requests
        for i in range(30):
            try:
                if requests.get('http://localhost:8000/').status_code == 200:
                    print('✅ FastAPI Backend is ready!')
                    exit(0)
            except Exception:
                pass
            print('Waiting for backend server to boot...')
            time.sleep(1)
        print('❌ Backend failed to start in 30 seconds!')
        exit(1)
        "

    - name: Start Flask Frontend in background
      env:
        API_BASE_URL: http://localhost:8000
      run: |
        python frontend/app.py &

    - name: Wait for Flask Frontend
      run: |
        python -c "
        import time, requests
        for i in range(30):
            try:
                if requests.get('http://localhost:5000/').status_code == 200:
                    print('✅ Flask Frontend is ready!')
                    exit(0)
            except Exception:
                pass
            print('Waiting for frontend server to boot...')
            time.sleep(1)
        print('❌ Frontend failed to start in 30 seconds!')
        exit(1)
        "

    - name: Run Test Cases
      run: |
        python test_cases.py
